---
- name: Setup Jenkins worker
  hosts: ins_worker
  become: true

  tasks:
    - name: Install Java 17
      ansible.builtin.dnf:
        name: java-17-amazon-corretto
        state: present

    - name: Create Jenkins working directory
      ansible.builtin.file:
        path: /home/ec2-user/jenkins
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: '0755'

    - name: Install Docker
      ansible.builtin.dnf:
        name: docker
        state: present

    - name: Enable and start Docker
      ansible.builtin.systemd:
        name: docker
        enabled: true
        state: started

    - name: Add ec2-user to docker group
      ansible.builtin.user:
        name: ec2-user
        groups: docker
        append: true

    - name: Install Node.js
      ansible.builtin.dnf:
        name: nodejs
        state: present

    - name: Install Git
      ansible.builtin.dnf:
        name: git
        state: present

